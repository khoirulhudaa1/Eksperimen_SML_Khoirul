name: Preprocessing Breast Cancer Dataset

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated preprocessing
        run: python preprocessing/automate_Khoirul.py

      - name: Upload processed dataset
        uses: actions/upload-artifact@v4
        with:
          name: breast-cancer-preprocessing
          path: preprocessing/breast_cancer_preprocessing/
